<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Advanced Neo-Brutalist Calculator</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="calculator">
            <div class="header">
                <h1>Neo Calculator</h1>
                <p>Advanced Web Calculator</p>
            </div>

            <!-- Top Controls -->
            <div class="top-controls">
                <button id="themeToggle">
                    🌙 Dark Mode
                </button>

                <!-- Calculator Mode -->
                <select id="calculatorMode">
                    <option value="standard">
                        Standard
                    </option>
                    <option value="programmer">
                        Programmer
                    </option>
                </select>
            </div>

            <!-- Display -->
            <div class="display">
                <div id="history">
                    0
                </div>
                <div id="screen">
                    0
                </div>
                <button id="copyBtn">📋 Copy</button>
            </div>

            <!-- Calculator BUttons -->
            <div class="buttons">
                <button class="operator" data-value="AC">AC</button>
                <button class="operator" data-value="DEL">DEL</button>
                <button class="operator" data-value="%">%</button>
                <button class="operator" data-value="/">÷</button>

                <button data-value="7">7</button>
                <button data-value="8">8</button>
                <button data-value="9">9</button>
                <button class="operator" data-value="*">×</button>

                <button data-value="4">4</button>
                <button data-value="5">5</button>
                <button data-value="6">6</button>
                <button class="operator" data-value="-">−</button>

                <button data-value="1">1</button>
                <button data-value="2">2</button>
                <button data-value="3">3</button>
                <button class="operator" data-value="+">+</button>

                <button id="binaryBtn">BIN</button>
                <button data-value="0">0</button>
                <button data-value=".">.</button>
                <button class="equal" data-value="=">=</button>
            </div>

            <!-- Programmer Panel -->
            <div class="programmer-panel">
                <h2>Programmer Mode</h2>
                <div class="conversion">
                    <div class="card">
                        <h3>HEX</h3>
                        <span id="hexValue">0</span>
                    </div>
                    <div class="card">
                        <h3>DEC</h3>
                        <span id="decValue">0</span>
                    </div>
                    <div class="card">
                        <h3>BIN</h3>
                        <span id="binValue">0</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Footer -->
    <footer>
        <h3>Advanced Neo Calculator</h3>
        <p>&copy; 2026 InternGrow Frontend Internship</p>
        <p>Designed by ❤️ <span>Kaleri Khan</span> </p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
